<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Directory Index</title>
</head>
<body>
    <h1>生成AIで作成したファイル一覧</h1>
    <ul id="file-list"></ul>
    <script>
        // 自分のユーザー名、リポジトリ名、フォルダパスに書き換えてください
        const user = 'genkuroki';
        const repo = 'genkuroki.gothub.io';
        const path = 'documents/AI'; // ルートの場合は空文字 ''

        const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('file-list');
                data.forEach(file => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = file.name; // ファイルへのリンク
                    a.textContent = file.name + (file.type === 'dir' ? '/' : '');
                    li.appendChild(a);
                    list.appendChild(li);
                });
            })
            .catch(error => console.error('Error fetching directory:', error));
    </script>
</body>
</html>
